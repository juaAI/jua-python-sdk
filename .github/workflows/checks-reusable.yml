name: Reusable CI Jobs

on:
  workflow_call:

jobs:
  check-commits:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full git history
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install commitizen
        run: |
          python -m pip install --upgrade pip
          pip install commitizen
      - name: Check commit messages (PR)
        if: github.event_name == 'pull_request'
        run: |
          cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
      - name: Check commit messages (Push)
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          # Fall back to merge-base if before is zeros or unreachable (force push)
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git rev-parse --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            git fetch origin main
            BEFORE=$(git merge-base origin/main HEAD)
          fi
          cz check --rev-range "$BEFORE"..${{ github.event.after }}

  lint:
    name: Run Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python, uv, Just, and Dependencies
        uses: ./.github/actions/setup
        with:
          python-version: "3.11"
      - name: Run linters with Just
        run: just lint

  test:
    name: Run Tests (Python 3.13, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python, uv, Just, and Dependencies
        uses: ./.github/actions/setup
        with:
          python-version: "3.13"
      - name: Run tests with Just and generate report
        run: just test-ci
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() # Use always() for robust reporting
        with:
          name: Pytest Results (Python 3.13, ${{ matrix.os }})
          path: "**/pytest-report.xml"
          reporter: java-junit
          fail-on-error: "true"
